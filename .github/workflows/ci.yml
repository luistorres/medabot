name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    env:
      # test-page-mapping.ts imports leafletProcessor, which constructs the
      # OpenAI client at module load. No request is made by the unit tests, but
      # the client constructor needs a non-empty key, so provide a dummy one.
      OPENAI_API_KEY: ci-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:unit
