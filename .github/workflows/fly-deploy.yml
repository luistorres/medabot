# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Assert Dockerfile Playwright tag matches locked version
        run: |
          IMG_VER=$(grep -oP '^FROM mcr\.microsoft\.com/playwright:v\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile)
          PKG_VER=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")
          echo "Dockerfile image: $IMG_VER | locked playwright: $PKG_VER"
          if [ "$IMG_VER" != "$PKG_VER" ]; then
            echo "::error::Dockerfile Playwright image tag ($IMG_VER) != locked playwright version ($PKG_VER). Update the FROM tag in Dockerfile to match." >&2
            exit 1
          fi
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
